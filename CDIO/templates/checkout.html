<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toan — PriceHunt</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Syne:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --bg-dark: #08080a;
            --accent: #f5a623;
            --font-main: 'Be Vietnam Pro', sans-serif;
        }

        body {
            font-family: var(--font-main) !important;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
        }

        .navbar {
            height: 75px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(8, 8, 10, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-text {
            font-family: 'Syne' !important;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo-text span {
            color: var(--accent);
        }

        .checkout-section {
            background: #111116;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: #1a1a1f;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-family: var(--font-main);
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .pay-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <div class="logo-text">PRICE<span>HUNT</span></div>
        </a>
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="/cart" style="color: #fff; text-decoration: none; font-weight: 600;">← Quay lai</a>
        </div>
    </nav>

    <div style="max-width: 1000px; margin: 50px auto; padding: 0 20px;">
        <h1 style="font-family: 'Syne'; margin-bottom: 40px; font-size: 2.5rem;">Thanh Toan</h1>

        <div style="display: grid; grid-template-columns: 1fr 380px; gap: 40px;">
            <form id="checkout-form" onsubmit="processPayment(event)">
                <div class="checkout-section">
                    <h3 style="margin-top: 0; color: var(--accent);">Thong tin nhan hang</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group" style="grid-column: span 2;"><label>Ho va ten</label><input type="text"
                                required></div>
                        <div class="form-group"><label>So dien thoai</label><input type="tel" required></div>
                        <div class="form-group"><label>Email</label><input type="email" required></div>
                        <div class="form-group" style="grid-column: span 2;"><label>Dia chi</label><textarea rows="3"
                                required></textarea></div>
                    </div>
                </div>
                <button type="submit" class="pay-btn">Thanh toan ngay →</button>
            </form>

            <div class="checkout-section">
                <h3 style="margin-top: 0;">Don hang cua ban</h3>
                {% for item in cart_items %}
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem;">
                    <span style="color: #888;">{{ item.title[:25] }}... x{{ item.quantity }}</span>
                    <span style="font-weight: 600;">{{ item.price_str }}</span>
                </div>
                {% endfor %}
                <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem;">
                    <span>Tong cong</span><span style="color: var(--accent);">{{ total }}</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function processPayment(e) {
            e.preventDefault();
            Swal.fire({
                title: 'Dang xu ly...',
                text: 'Vui long khong dong trang nay',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });
            setTimeout(() => {
                Swal.fire({ icon: 'success', title: 'Thanh toan thanh cong!', background: '#111116', color: '#fff', confirmButtonColor: '#f5a623' })
                    .then(() => { window.location.href = '/'; });
            }, 2500);
        }
    </script>
</body>

</html>
