<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — PriceHunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">PriceHunt</span></a>
    <div class="nav-links">
        <a href="/" class="nav-link">Trang chủ</a>
        <a href="/register" class="nav-btn btn-primary">Đăng ký</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">⚡</span>
            <h1>Đăng nhập</h1>
            <p>Chào mừng trở lại PriceHunt</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form action="/login" method="POST" class="auth-form">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-submit">Đăng nhập →</button>
        </form>

        <p class="auth-switch">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
    </div>
    <div class="auth-bg-art"></div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
